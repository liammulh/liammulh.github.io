<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character to UTF-16</title>
  </head>
  <body>
    <h1>Character to UTF-16</h1>
    <form>
      <p>
        <label for="character">Input Character:</label>
      </p>
      <p>
        <input id="character" />
      </p>
      <p>
        <button onclick="alertCharacterCode()">
          Get UTF-16 Character Code
        </button>
      </p>
    </form>
  </body>

  <style>
    table,
    th,
    td {
      border: 1px solid black;
    }
  </style>

  <script>
    const alertCharacterCode = () => {
      const character = document.getElementById("character");
      const utf16 = character.value.charCodeAt(0);
      window.alert(
        `UTF-16 character code of ${character.value[0]} is ${utf16}.`
      );
    };
  </script>
</html>
